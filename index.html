<script>
var DATA = [];
var PLACEHOLDER = '작성 예정';

function splitPipes(s){
  if(!s) return [];
  return String(s).split('|||').map(function(x){ return x.trim(); }).filter(function(x){ return x.length > 0; });
}
function parseFaq(s){
  if(!s || s.trim() === PLACEHOLDER) return [];
  var blocks = splitPipes(s);
  var out = [];
  blocks.forEach(function(b){
    var parts = b.split(/A\s*[:：]/);
    if(parts.length < 2) return;
    var qPart = parts[0].replace(/^Q\s*[:：]\s*/, '').trim();
    var aPart = parts.slice(1).join('A:').trim();
    if(qPart && aPart) out.push({ q: qPart, a: aPart });
  });
  return out;
}
function parseLinks(s){
  if(!s) return [];
  var items = splitPipes(s);
  var out = [];
  items.forEach(function(it){
    var idx = it.indexOf('|');
    if(idx < 0) return;
    var label = it.substring(0, idx).trim();
    var url = it.substring(idx + 1).trim();
    if(!url || url === '…' || url.indexOf('http') !== 0) return;
    out.push({ label: label, url: url });
  });
  return out;
}
function parseKeywords(s){
  if(!s) return [];
  return String(s).split(/[,，]/).map(function(x){ return x.trim(); }).filter(function(x){ return x.length > 0; });
}
function parseProcess(s){
  if(!s || s.trim() === PLACEHOLDER) return [];
  return splitPipes(s);
}
function normalizePolicy(s){
  if(!s || s.trim() === PLACEHOLDER) return '';
  return s;
}

  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave", item_title:"연차휴가", keywords:"근태, 연차, 휴가, 연차휴가, 반차, 반반차", layout_type:"multi", policy_body:"[연차휴가란?]\n근로기준법 제60조(연차 유급휴가)에 따라 근로자에게 부여되는 유급휴가입니다.\n\n[발생 기준]\nº 입사 당해연도 : 입사일~연말까지 근무실적에 비례하여 발생 \n  (입사일~연말까지 근무일수 ÷ 소정근로일수 X 15)\nº 입사 차년도 ~ : 15개 + 근속에 따른 가산휴가 발생 \n  (만 3년 초과 시 매 2년마다 1개 가산, 최대 11개 한도)\n\n[사용 기준]\nº 「연차(8H), 반차+반반차(6H), 반차(4H), 반반차(2H)」 선택하여 사용 가능\n  - 집중휴가 (연속 5일 또는 2+3일 분할 사용) \n  - 공동연차 (연초 그룹웨어 공지)", process_steps:"HRIS 근태신청 → 승인 → 휴가 사용\n\n[HRIS 신청]\nº 신청경로\n  - PC : 〔근태관리〕 → 〔근태신청〕 → 〔근태신청〕\n  - Mobile : 〔휴가/근태신청〕 → 〔근태신청〕 → 〔연차휴가〕\n\nº 신청방법 \n  - 신청서 작성\n    ① 근태 선택(연차휴가-연차, 반차, 2h, 4h, 6h)\n        *1년 미만자는 '연차휴가(1년 미만)'선택\n    ② 신청일자 설정\n    ③ 사용휴가 선택\n        *내역이 보이지 않는 경우 노무지원팀 문의\n    ④ 결재선 설정\n        (결재) 반장 → 팀장", faq:"Q : 당일 연차 신청이 가능한가요?\nA : 생산 운영, 업무 등에 차질을 방지하기 위해 최소 1일 전까지 사전신청 해주시기 바랍니다.\n|||\nQ : 발생된 연차를 모두 사용했는데, 초과 사용이 가능한가요?\nA : 연차휴가는 기 발생된 일수에 한하여 사용 가능합니다.\n잔여 연차가 없는 상태에서 불가피하게 휴가가 필요한 경우 '유계결근' 처리가 가능하므로, 사전에 노무지원팀으로 문의해 주시기 바랍니다.\n|||\nQ : 시간단위 휴가(2h, 4h, 6h)는 어떻게 사용하나요?\nA : 출근 또는 퇴근시간을 기준으로만 사용 가능하며, 근무시간 도중 사용은 불가합니다.", related_links:null },
  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave-2", item_title:"가족돌봄휴가", keywords:"근태, 연차, 가족돌봄, 가족, 가족돌봄휴가", layout_type:"multi", policy_body:"[가족돌봄휴가란?]\n가족의 질병, 사고, 노령 또는 자녀의 양육을 위하여 사용하는 무급휴가입니다. \n(돌봄대상 : 조부모, 부모, 배우자, 배우자의 부모, 자녀, 손자녀)\n\n[사용 기준]\nº 연 최대 10일 사용 가능(1일 단위 사용 가능)\nº 가족돌봄휴직 기간(최대 90일) 내에 포함하여 사용", process_steps:"HRIS 근태신청 → 승인 → 휴가 사용\n※ 진단서 등 돌봄필요 증빙서류 사전제출이 어려울 경우, 사후제출 가능 \n\n[HRIS 신청]\nº 신청경로\n  - PC : 〔근태관리〕 → 〔근태신청〕 → 〔근태신청〕\n  - Mobile : 〔휴가/근태신청〕 → 〔근태신청〕 → 〔가족돌봄휴가〕\n\nº 신청방법 \n  - 신청서 작성\n    ① 근태 선택(가족돌봄휴가)\n    ② 신청일자 설정\n    ③ 첨부파일 : 가족관계증명서, 돌봄필요 증빙서류\n    ④ 결재선 설정\n        (결재) 반장 → 팀장", faq:"작성 예정", related_links:null },
  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave-3", item_title:"하계휴가", keywords:"휴가, 여름휴가, 하계휴가, 여름", layout_type:"multi", policy_body:"[하계휴가란?]\n사내 규정에 따라, 여름철 근로자의 피로 회복과 충전을 위해 부여되는 유급휴가입니다.\n\n[발생 기준]\nº 하계휴가 이전 입사자의 경우 5일 발생 (하계휴가 이후 입사자 미발생)\n\n[사용 기준]\nº 공장 하계휴가 일정에 맞게 사용 \nº 하계휴가기간 업무일정이 있는 경우 하기휴가 사용일정 조정 가능\n  - 부서별 출근인원 / 일정 / 사유 / 대체휴가일정 작성 후 업무협조전 회신\n  - 대체사용기간 : 7월~8월 내 (부득이 한 경우, 일정 조율 가능)\n  - 대체사용 : 연속사용이 원칙이며 업무상 부득이한 경우 1회 분할 가능", process_steps:"HRIS 근태신청 → 승인 → 휴가 사용\n※ 공장 하계휴가 기간 내 휴가사용 시 별도 신청 불필요\n\n[HRIS 신청]\nº 신청경로\n  - PC : 〔근태관리〕 → 〔근태신청〕 → 〔근태신청〕\n  - Mobile : 〔휴가/근태신청〕 → 〔근태신청〕 → 〔하계휴가〕\n\nº 신청방법 \n  - 신청서 작성\n    ① 근태 선택(하계휴가)\n    ② 신청일자 설정\n    ③ 사용휴가 선택\n        *내역이 보이지 않는 경우 노무지원팀 문의\n    ④ 결재선 설정\n        (결재) 반장 → 팀장", faq:"작성 예정", related_links:null },

  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave-6", item_title:"정년휴가", keywords:"휴가, 정년, 정년휴가", layout_type:"multi", policy_body:"[정년휴가란?]\n정년 퇴직자에게 부여되는 유급휴가입니다.\n\n[발생 기준]\nº 당해년도 정년퇴직자 대상 10일 발생\n\n[사용 기준]\nº 퇴직 당해년도 연중 자유롭게 사용 가능", process_steps:"HRIS 근태신청 → 승인 → 휴가 사용\n\n[HRIS 신청]\nº 신청경로\n  - PC : 〔근태관리〕 → 〔근태신청〕 → 〔근태신청〕\n  - Mobile : 〔휴가/근태신청〕 → 〔근태신청〕 → 〔정년휴가〕\n\nº 신청방법 \n  - 신청서 작성\n    ① 근태 선택(정년휴가)\n    ② 신청일자 설정\n    ③ 사용휴가 선택\n        *내역이 보이지 않는 경우 노무지원팀 문의\n    ④ 결재선 설정\n        (결재) 반장 → 팀장", faq:"작성 예정", related_links:null },
  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave-7", item_title:"배우자 출산휴가", keywords:"휴가, 배우자출산휴가, 배우자, 출산", layout_type:"multi", policy_body:"[배우자출산휴가란?]\n배우자 출산 후 남성직원이 가족과 소중한 시간을 함께 보낼 수 있도록 부여되는 유급휴가입니다.\n\n[발생 기준]\nº 배우자가 출산을 한 남성직원 대상 20일 발생\n\n[사용 기준]\nº 출산일로부터 180일 내 사용완료 \nº 최대 3회 분할 사용 가능", process_steps:"HRIS 근태신청 → 승인 → 휴가 사용\n\n[HRIS 신청]\nº 신청경로\n  - PC : 〔근태관리〕 → 〔근태신청〕 → 〔근태신청〕\n  - Mobile : 〔휴가/근태신청〕 → 〔근태신청〕 → 〔배우자출산휴가〕\n\nº 신청방법 \n  - 신청서 작성\n    ① 근태 선택(정년휴가)\n    ② 신청일자 설정\n    ③ 첨부파일 : 출생증명서 또는 출산일/예정일을 증명할 수 있는 서류 \n    ④ 결재선 설정\n        (결재) 반장 → 팀장", faq:"작성 예정", related_links:null },
  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave-8", item_title:"출산전후휴가", keywords:"휴가, 출산, 산전후 휴가", layout_type:"multi", policy_body:"작성 예정", process_steps:"작성 예정", faq:"작성 예정", related_links:null },
  { category_id:"leave", category_name:"휴가", category_icon:"🏖️", category_desc:"연차, 가족돌봄, 출산휴가 등 사유별 휴가 안내", item_id:"leave-9", item_title:"유산·사산휴가", keywords:"휴가, 유산, 사산, 유사산휴가", layout_type:"multi", policy_body:"작성 예정", process_steps:"작성 예정", faq:"작성 예정", related_links:null },

function loadData(){
  DATA = RAW_DATA.map(function(r){
    return {
      categoryId: r.category_id,
      categoryName: r.category_name,
      categoryIcon: r.category_icon,
      categorySub: r.category_desc,
      id: r.item_id,
      title: r.item_title,
      keywords: parseKeywords(r.keywords),
      layoutType: r.layout_type || 'multi',
      singleContent: r.single_content || '',
      policy: normalizePolicy(r.policy_body),
      process: parseProcess(r.process_steps),
      faqs: parseFaq(r.faq),
      links: parseLinks(r.related_links)
    };
  });
  renderList(DATA);
}

function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function highlightBrackets(escapedHtml){
  if(!escapedHtml) return '';
  return escapedHtml.replace(/\[([^\]\n]+)\]/g, '<span class="bracket">[$1]</span>');
}
function domain(u){ try{ return new URL(u).hostname.replace(/^www\./,''); }catch(e){ return u; } }
function groupByCat(items){ var map = {}, order = []; items.forEach(function(it){ if(!map[it.categoryId]){ map[it.categoryId] = { id: it.categoryId, name: it.categoryName, icon: it.categoryIcon, sub: it.categorySub, items: [] }; order.push(it.categoryId); } map[it.categoryId].items.push(it); }); return order.map(function(k){ return map[k]; }); }
function renderList(items){
  var wrap = document.getElementById('cat-list');
  var count = document.getElementById('list-count');
  wrap.innerHTML = '';
  var groups = groupByCat(items);
  count.textContent = groups.length + ' CAT · ' + items.length + ' ITEM';
  groups.forEach(function(g){
    var card = document.createElement('div'); card.className = 'cat-card';
    var lis = g.items.map(function(it){ return '<li data-id="'+esc(it.id)+'"><span class="bul"></span><span class="txt">'+esc(it.title)+'</span><span class="arrow">→</span></li>'; }).join('');
    card.innerHTML = '<div class="cat-head"><div class="cat-icon">'+esc(g.icon||'📄')+'</div><div class="cat-title"><h3>'+esc(g.name)+'</h3><div class="sub">'+esc(g.sub||'')+'</div></div><div class="cat-count">'+g.items.length+'건</div></div><ul class="sub-list">'+lis+'</ul>';
    card.querySelectorAll('.sub-list li').forEach(function(li){ li.addEventListener('click', function(){ openDetail(li.getAttribute('data-id')); }); });
    wrap.appendChild(card);
  });
}
function openDetail(id){
  var it = DATA.filter(function(x){ return x.id===id; })[0]; if(!it) return;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail').style.display = 'block'; window.scrollTo(0,0);
  document.getElementById('back-cat').textContent = it.categoryName.toUpperCase();
  document.getElementById('d-crumb').textContent = it.categoryName;
  document.getElementById('d-title').textContent = it.title;
  document.getElementById('d-kw').innerHTML = (it.keywords||[]).map(function(k){ return '<span class="k"># '+esc(k)+'</span>'; }).join('');
  var acc = document.getElementById('acc'); var html = '';
  var emptyMsg = '<div style="padding:6px 4px;font-size:12.5px;color:var(--ink-mute);">작성 예정입니다.</div>';

  // Single-tab layout (HR돋보기 · 급여명세서 돋보기)
  if (it.layoutType === 'single') {
    var singleBody = (it.singleContent && it.singleContent.length) ? '<div class="rule-text">'+highlightBrackets(esc(it.singleContent))+'</div>' : emptyMsg;
    html += '<div class="sec s-policy open"><div class="sec-head"><div class="sec-badge emoji">📖</div><div class="sec-title">용어설명 및 계산식<small>GLOSSARY</small></div><div class="sec-chev">▼</div></div><div class="sec-body">'+singleBody+'</div></div>';
    acc.innerHTML = html;
    acc.querySelectorAll('.sec-head').forEach(function(h){ h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); }); });
    return;
  }

  // Multi-tab layout: 01 사내규정 / 02 프로세스 / 03 FAQ / 04 관련링크
  var policyBody = (it.policy && it.policy.length) ? '<div class="rule-text">'+highlightBrackets(esc(it.policy))+'</div>' : emptyMsg;
  html += '<div class="sec s-policy open"><div class="sec-head"><div class="sec-badge">01</div><div class="sec-title">사내규정<small>POLICY</small></div><div class="sec-chev">▼</div></div><div class="sec-body">'+policyBody+'</div></div>';

  var processBody = emptyMsg;
  var procArr = (it.process || []).slice();
  if (procArr.length > 0) {
    // 첫 번째 블록에서 '첫 문단' 전체를 뽑아냄 (빈 줄이 나오기 전까지)
    var firstBlock = procArr[0];
    var lines = firstBlock.split('\n');
    var startIdx = 0;
    while (startIdx < lines.length && lines[startIdx].trim().length === 0) startIdx++;
    var paraLines = [];
    var i = startIdx;
    while (i < lines.length && lines[i].trim().length > 0) {
      paraLines.push(lines[i]);
      i++;
    }
    var headline = paraLines.join('\n').replace(/\s+$/, '');
    var rest = lines.slice(i).join('\n').replace(/^\n+/, '');
    if (rest.length > 0) { procArr[0] = rest; } else { procArr.shift(); }
    var pillHtml = '';
    if (headline) {
      var pretty = highlightBrackets(esc(headline)).replace(/(\s*→\s*|\s*&gt;\s*)/g, '<span class="arrow">→</span>');
      pillHtml = '<div class="process-pill">'+pretty+'</div>';
    }
    var stepsHtml = procArr.map(function(s){ return '<li>'+highlightBrackets(esc(s))+'</li>'; }).join('');
    var stepsBlock = stepsHtml ? '<ul class="steps">'+stepsHtml+'</ul>' : '';
    if (pillHtml || stepsBlock) processBody = pillHtml + stepsBlock;
  }
  html += '<div class="sec s-process open"><div class="sec-head"><div class="sec-badge">02</div><div class="sec-title">신청 프로세스<small>PROCESS</small></div><div class="sec-chev">▼</div></div><div class="sec-body">'+processBody+'</div></div>';

  var faqHtml = (it.faqs||[]).map(function(f){ return '<div class="faq-item"><div class="faq-q">'+highlightBrackets(esc(f.q))+'</div><div class="faq-a">'+highlightBrackets(esc(f.a))+'</div></div>'; }).join('');
  var faqBody = faqHtml || emptyMsg;
  html += '<div class="sec s-faq open"><div class="sec-head"><div class="sec-badge">03</div><div class="sec-title">자주 묻는 질문<small>FAQ</small></div><div class="sec-chev">▼</div></div><div class="sec-body">'+faqBody+'</div></div>';

  var linkHtml = (it.links||[]).map(function(l){ return '<a class="link-item" href="'+esc(l.url)+'" target="_blank" rel="noopener"><span class="li-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span><div class="li-text"><div class="l1">'+esc(l.label)+'</div><div class="l2">'+esc(domain(l.url))+'</div></div><span class="li-arrow">↗</span></a>'; }).join('');
  var linkBody = linkHtml ? '<div class="link-list">'+linkHtml+'</div>' : emptyMsg;
  html += '<div class="sec s-link open"><div class="sec-head"><div class="sec-badge">04</div><div class="sec-title">관련 정보<small>RESOURCES</small></div><div class="sec-chev">▼</div></div><div class="sec-body">'+linkBody+'</div></div>';
  acc.innerHTML = html;
  acc.querySelectorAll('.sec-head').forEach(function(h){ h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); }); });
}
document.getElementById('back').addEventListener('click', function(){ document.getElementById('detail').style.display = 'none'; document.getElementById('list-view').style.display = 'block'; });

var qInput = document.getElementById('q');
var qClear = document.getElementById('clear');
function applyFilter(){
  var q = (qInput.value||'').trim().toLowerCase();
  qClear.classList.toggle('on', q.length > 0);
  if(!q){ renderList(DATA); return; }
  var filtered = DATA.filter(function(it){
    if((it.title||'').toLowerCase().indexOf(q) >= 0) return true;
    if((it.categoryName||'').toLowerCase().indexOf(q) >= 0) return true;
    if((it.keywords||[]).some(function(k){ return k.toLowerCase().indexOf(q) >= 0; })) return true;
    return false;
  });
  renderList(filtered);
}
qInput.addEventListener('input', applyFilter);
qClear.addEventListener('click', function(){ qInput.value=''; applyFilter(); qInput.focus(); });

loadData();
</script>
